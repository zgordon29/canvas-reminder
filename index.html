<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canvas Reminder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f9fafb; color: #111827; }
    header { background: #4f46e5; padding: 40px 24px; text-align: center; }
    header h1 { color: #fff; font-size: 2rem; font-weight: 700; }
    header p { color: #c7d2fe; margin-top: 8px; font-size: 1rem; }
    main { max-width: 640px; margin: 60px auto; padding: 0 24px; }
    h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 16px; }
    p { color: #6b7280; line-height: 1.7; margin-bottom: 24px; }
    .links { display: flex; gap: 16px; flex-wrap: wrap; }
    .links a {
      display: inline-block; padding: 12px 24px; border-radius: 8px;
      background: #4f46e5; color: #fff; text-decoration: none; font-weight: 500;
      transition: background 0.2s;
    }
    .links a:hover { background: #4338ca; }
    footer { text-align: center; color: #9ca3af; font-size: 0.85rem; padding: 40px 24px; }
  </style>
</head>
<body>
  <header>
    <h1>Canvas Reminder</h1>
    <p>Daily SMS homework reminders for students</p>
  </header>
  <main>
    <h2>Legal</h2>
    <p>Please review our policies before using Canvas Reminder.</p>
    <div class="links">
      <a href="privacy-policy.html">Privacy Policy</a>
      <a href="terms.html">Terms &amp; Conditions</a>
    </div>
  </main>
  <footer>&copy; 2026 Canvas Reminder. All rights reserved.</footer>
</body>
</html>
